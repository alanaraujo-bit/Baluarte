<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #05070f; }
    .hex-stroke { fill: none; stroke: #35f0ff; stroke-width: 1.2; stroke-linejoin: round; }
    .hex-glow { fill: none; stroke: #35f0ff; stroke-opacity: 0.3; stroke-width: 2.5; stroke-linejoin: round; }
    .inner-bg { fill: rgba(10,16,36,0.7); }
    .core-outer { fill: #ffc857; }
    .core-inner { fill: #35f0ff; }
    .core-white { fill: #ffffff; }

    @media (prefers-color-scheme: light) {
      .bg { fill: #f0f4ff; }
      .hex-stroke { stroke: #0098cc; }
      .hex-glow { stroke: rgba(0,152,204,0.25); }
      .inner-bg { fill: rgba(200,215,240,0.6); }
      .core-outer { fill: #cc9900; }
      .core-inner { fill: #0088b3; }
      .core-white { fill: #005580; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="32" height="32" rx="6.5"/>

  <!-- Outer hexagon glow -->
  <polygon class="hex-glow" points="16,3 27.99,9.5 27.99,22.5 16,29 4.01,22.5 4.01,9.5"/>

  <!-- Outer hexagon stroke -->
  <polygon class="hex-stroke" points="16,4.5 26.66,10.25 26.66,21.75 16,27.5 5.34,21.75 5.34,10.25"/>

  <!-- Inner diamond-orientation hexagon -->
  <polygon class="inner-bg" points="16,9.5 21.5,12.55 21.5,19.45 16,22.5 10.5,19.45 10.5,12.55"/>

  <!-- Central core glow -->
  <circle class="core-outer" cx="16" cy="16" r="4.2" opacity="0.4"/>
  <circle class="core-inner" cx="16" cy="16" r="2.8" opacity="0.7"/>
  <circle class="core-white" cx="16" cy="16" r="1.5" opacity="0.9"/>

  <!-- Glass highlight streak -->
  <line x1="11" y1="11" x2="15.5" y2="15" stroke="white" stroke-width="0.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="20.5" y1="11.5" x2="17.5" y2="14" stroke="white" stroke-width="0.4" opacity="0.15" stroke-linecap="round"/>
</svg>
